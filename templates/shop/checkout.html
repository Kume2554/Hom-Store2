<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>ชำระเงิน - Hom Store</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-7">
                    <div class="card shadow border-0 p-4 mb-3">
                        <h4 class="mb-3 text-primary">ที่อยู่จัดส่ง</h4>
                        <input type="text" name="fullname" class="form-control mb-2" placeholder="ชื่อ-นามสกุล" required>
                        <input type="tel" name="phone" class="form-control mb-2" placeholder="เบอร์โทรศัพท์" required>
                        <textarea name="address" class="form-control" rows="3" placeholder="ที่อยู่..." required></textarea>
                    </div>
                    <div class="card shadow border-0 p-4">
                        <h4 class="mb-3 text-primary">วิธีชำระเงิน</h4>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payment_method" value="โอนเงินผ่าน QR Code" id="qrp" checked onclick="toggleQR(true)">
                            <label for="qrp">โอนเงินผ่าน QR Code (พร้อมเพย์)</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="payment_method" value="เก็บเงินปลายทาง" id="cod" onclick="toggleQR(false)">
                            <label for="cod">เก็บเงินปลายทาง (COD)</label>
                        </div>
                        <div id="qr_section" class="text-center p-3 border rounded bg-white">
                            <p class="text-danger fw-bold">สแกนเพื่อโอนเงิน</p>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0812345678" class="mb-3" style="max-width:200px;">
                            <p class="small text-muted">ชื่อบัญชี: สมชาย ใจดี</p>
                            <label class="form-label fw-bold">แนบสลิปยืนยัน</label>
                            <input type="file" name="slip_image" id="slip_input" class="form-control" accept="image/*" required>
                        </div>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card shadow border-0 p-4 text-center">
                        <h5>ยอดชำระ: <span class="text-success fw-bold">{{ total_price }} บาท</span></h5>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 fw-bold">ยืนยันการสั่งซื้อ</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script>
    function toggleQR(show) {
        document.getElementById('qr_section').style.display = show ? 'block' : 'none';
        document.getElementById('slip_input').required = show;
    }
    </script>
</body>
</html>
