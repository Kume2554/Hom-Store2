<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>ตะกร้าสินค้า - Hom Store</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4 fw-bold">ตะกร้าสินค้าของคุณ</h2>
        <div class="card shadow border-0">
            <div class="card-body p-0">
                <table class="table align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">สินค้า</th>
                            <th>ราคา</th>
                            <th>จำนวน</th>
                            <th>รวม</th>
                            <th class="text-center">ลบ</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in cart_items %}
                        <tr>
                            <td class="ps-4 fw-bold">{{ item.product.name }}</td>
                            <td>{{ item.product.price }} บาท</td>
                            <td>{{ item.quantity }}</td>
                            <td class="text-primary fw-bold">{{ item.subtotal }} บาท</td>
                            <td class="text-center">
                                <a href="{% url 'cart_remove' item.product.id %}" class="btn btn-outline-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white py-4 text-end">
                <h4 class="mb-3">ยอดรวม: <span class="text-success fw-bold">{{ total_price }} บาท</span></h4>
                <a href="{% url 'checkout' %}" class="btn btn-primary btn-lg px-5 shadow">ดำเนินการสั่งซื้อ</a>
            </div>
        </div>
    </div>
</body>
</html>
